<!DOCTYPE html>
<html>
<head>
    <title>Your Shortened URL</title>
</head>
<body>
    <h2>Your Shortened URL:</h2>

    <!-- Use an input element for better copy support -->
    <input type="text" id="shortUrl" value="{{.ShortURL}}" readonly style="width: 300px;">
    <button onclick="copyToClipboard()">Copy to Clipboard</button>

    <br><br>
    <a href="/">Back to Home</a>

    <script>
        function copyToClipboard() {
            const copyText = document.getElementById("shortUrl");
            copyText.select(); // Select the text
            copyText.setSelectionRange(0, 99999); // For mobile devices

            try {
                const successful = document.execCommand("copy");
                if (successful) {
                    alert("Copied to clipboard!");
                } else {
                    alert("Failed to copy.");
                }
            } catch (err) {
                alert("Browser does not support copy function: " + err);
            }
        }
    </script>
</body>
</html>
