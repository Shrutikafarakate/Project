<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            overflow-x: auto;
        }

        h2, h3 {
            color: #333;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"],
        input[type="datetime-local"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            width: 100%;
        }

        button {
            padding: 12px 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        thead {
            background-color: #f0f0f0;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 0.95rem;
        }

        /* Increase the width of the Expiry Date column */
        table th:nth-child(3),
        table td:nth-child(3) {
            width: 200px; /* Adjust this value as needed */
        }

        a {
            color: #007bff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .copy-btn {
            padding: 5px 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background-color 0.3s;
        }

        .copy-btn:hover {
            background-color: #218838;
        }

        .logout-link {
            display: block;
            margin-top: 30px;
            text-align: center;
            color: #dc3545;
            text-decoration: none;
            font-weight: bold;
        }

        .logout-link:hover {
            text-decoration: underline;
        }
    </style>
    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied to clipboard: " + text);
            }).catch(err => {
                alert("Failed to copy: " + err);
            });
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>Welcome, {{.Username}}</h2>
        <form method="POST" action="/shorten">
            <input type="text" name="original_url" placeholder="Enter URL" required>
            <label>Expiry Date & Time:</label>
            <input type="datetime-local" name="expiry" required>
            <button type="submit">Shorten</button>
        </form>

        <h3>Your Shortened URLs</h3>
        <table>
            <thead>
                <tr>
                    <th>Short URL</th>
                    <th>Original URL</th>
                    <th>Expiry Date</th>
                    <th>Copy</th>
                </tr>
            </thead>
            <tbody>
                {{range .URLs}}
                <tr>
                    <td><a href="/u/{{.ShortCode}}" target="_blank">/u/{{.ShortCode}}</a></td>
                    <td>{{.OriginalURL}}</td>
                    <td>{{.Expiry.Format "2006-01-02 03:04 PM"}}</td>
                    <td>
                        <button class="copy-btn" onclick="copyToClipboard(window.location.origin + '/u/{{.ShortCode}}')">Copy</button>
                    </td>
                </tr>
                {{else}}
                <tr>
                    <td colspan="4">No URLs yet.</td>
                </tr>
                {{end}}
            </tbody>
        </table>

        <a class="logout-link" href="/logout">Logout</a>
    </div>
</body>
</html>
