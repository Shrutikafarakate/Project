<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('/static/ur.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      animation: fadeIn 1.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      margin-top: 50px;
      background-color: rgba(255, 255, 255, 0.95);
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 900px;
      overflow-x: auto;
    }

    .welcome-box {
      background: linear-gradient(145deg, #8e2de2, #e75480);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(231, 84, 128, 0.5), 0 0 30px rgba(142, 45, 226, 0.4);
      margin-bottom: 20px;
      text-align: center;
    }

    .glow-text {
      color: #fff;
      font-size: 2rem;
      font-weight: bold;
      text-shadow: 0 0 5px #ff69b4, 0 0 10px #ff69b4, 0 0 20px #da70d6;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 5px #ff69b4, 0 0 10px #ff69b4, 0 0 20px #da70d6;
      }
      to {
        text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #ff66cc;
      }
    }

    .nav-links {
      margin-top: 10px;
      text-align: center;
      margin-bottom: 30px;
    }

    .nav-links a {
      margin: 0 15px;
      text-decoration: none;
      color: #5f27cd;
      font-weight: bold;
      font-size: 1.1rem;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: #c56cf0;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 30px;
    }

    input[type="text"],
    input[type="datetime-local"] {
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      background-color: #f5f5f5;
      color: #333;
    }

    input[type="text"]:focus,
    input[type="datetime-local"]:focus {
      outline: none;
      border-color: #c56cf0;
      background-color: #fce4ec;
    }

    button,
    .copy-btn {
      padding: 14px 20px;
      background: linear-gradient(135deg, #c56cf0, #ff9ff3);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      text-shadow: 0 0 5px #ff66cc, 0 0 10px #ff66cc;
    }

    button:hover,
    .copy-btn:hover {
      background: linear-gradient(135deg, #a55eea, #f368e0);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }

    h3 {
      margin-top: 30px;
      font-size: 1.5rem;
      color: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    thead {
      background-color: #f2f2f2;
    }

    td a {
      color: #c56cf0;
      font-weight: bold;
      text-decoration: none;
    }

    td a:hover {
      color: #e75480;
      text-decoration: underline;
    }

    /* Logout button box styling */
    .logout-link {
      display: flex;
      justify-content: center;
      margin-top: 35px;
    }

    .logout-box {
      background: linear-gradient(145deg, #e75480, #8e2de2);
      padding: 15px 25px;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      font-size: 1.2rem;
      color: #fff;
      font-weight: bold;
      text-decoration: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .logout-box:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }

  </style>

  <script>
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert("Copied to clipboard: " + text);
      }).catch(err => {
        alert("Failed to copy: " + err);
      });
    }
  </script>
</head>
<body>
  <div class="container">

    <div class="welcome-box">
      <div class="glow-text">Welcome, {{.Username}}</div>
    </div>

    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/about">About</a>
    </div>

    <form method="POST" action="/shorten">
      <input type="text" name="original_url" placeholder="Enter URL to shorten" required>
      <label class="label">Expiry Date & Time:</label>
      <input type="datetime-local" name="expiry" required>
      <button type="submit">Shorten URL</button>
    </form>

    <h3>Your Shortened URLs</h3>
    <table>
      <thead>
        <tr>
          <th>Short URL</th>
          <th>Original URL</th>
          <th>Expiry Date</th>
          <th>Copy</th>
        </tr>
      </thead>
      <tbody>
        {{range .URLs}}
        <tr>
          <td><a href="/u/{{.ShortCode}}" target="_blank">/u/{{.ShortCode}}</a></td>
          <td>{{.OriginalURL}}</td>
          <td>{{.Expiry.Format "2006-01-02 03:04 PM"}}</td>
          <td><button class="copy-btn" onclick="copyToClipboard(window.location.origin + '/u/{{.ShortCode}}')">Copy</button></td>
        </tr>
        {{else}}
        <tr><td colspan="4">No URLs yet.</td></tr>
        {{end}}
      </tbody>
    </table>

    <!-- Logout box with styled button -->
    <div class="logout-link">
      <a href="/logout" class="logout-box">Logout</a>
    </div>

  </div>
</body>
</html>
